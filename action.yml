name: 'Build Zig Compiler'
description: 'Builds the Zig compiler from source with custom patches'

inputs:
  patch-file:
    description: 'Path to the patch file to apply before building'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    # TODO: build Zig statically so compiler dependencies can be conditionally installed
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build libxml2-dev curl

        # Install LLVM 22
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22
        rm llvm.sh

        # Install necessary LLVM 22 development packages
        sudo apt-get install -y libllvm22 llvm-22-dev libclang-22-dev clang-22 lld-22 liblld-22 liblld-22-dev

    - name: Get cache key components
      id: cache-key
      shell: bash
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "compiler_path=$(dirname $PWD)/zig/build" >> $GITHUB_OUTPUT
        if [ -n "${{ inputs.patch-file }}" ]; then
          echo "patch_hash=$(sha256sum ${{ github.workspace }}/${{ inputs.patch-file }} | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT
        else
          echo "patch_hash=no_patch" >> $GITHUB_OUTPUT
        fi

    - name: Cache Zig compiler
      id: cache-zig
      uses: actions/cache@v4
      with:
        path: ${{ steps.cache-key.outputs.compiler_path }}
        key: zig-compiler-${{ runner.os }}-${{ steps.cache-key.outputs.date }}-${{ steps.cache-key.outputs.patch_hash }}

    # - name: Install dependencies
    #   if: steps.cache-zig.outputs.cache-hit != 'true'
    #   shell: bash
    #   run: |
    #     sudo apt-get update
    #     sudo apt-get install -y cmake ninja-build libxml2-dev curl

    #     # Install LLVM 22
    #     wget https://apt.llvm.org/llvm.sh
    #     chmod +x llvm.sh
    #     sudo ./llvm.sh 22

    #     # Install necessary LLVM 22 development packages
    #     sudo apt-get install -y libllvm22 llvm-22-dev libclang-22-dev clang-22 lld-22 liblld-22 liblld-22-dev

    - name: Clone Zig repository
      if: steps.cache-zig.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ..
        git clone https://codeberg.org/ziglang/zig.git
        cd zig

    - name: Apply version patch
      if: steps.cache-zig.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ../zig
        patch -p1 < $GITHUB_ACTION_PATH/version.patch

    - name: Apply input patch
      if: steps.cache-zig.outputs.cache-hit != 'true' && inputs.patch-file != ''
      shell: bash
      run: |
        cd ../zig
        patch -p1 < ${{ github.workspace }}/${{ inputs.patch-file }}

    - name: Configure build
      if: steps.cache-zig.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ../zig
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -GNinja

    - name: Build Zig compiler
      if: steps.cache-zig.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd ../zig/build
        ninja

    - name: Add Zig to PATH
      shell: bash
      run: |
        ZIG_DIR=$(realpath ../zig/build/stage3)
        chmod +x ${ZIG_DIR}/bin/zig
        echo "${ZIG_DIR}/bin" >> $GITHUB_PATH
        echo "Added Zig compiler to PATH: ${ZIG_DIR}/bin"

    - name: Zig version
      shell: bash
      run: |
        zig version
